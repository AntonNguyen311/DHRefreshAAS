name: Deploy – Azure Function App (vn-fa-sa-sdp-p-aas)

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  AZURE_FUNCTIONAPP_NAME: vn-fa-sa-sdp-p-aas

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DHRefreshAAS.sln

      - name: Build
        run: dotnet build DHRefreshAAS.sln -c Release --no-restore

      - name: Test
        run: dotnet test DHRefreshAAS.sln -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish DHRefreshAAS.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
